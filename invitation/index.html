<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Wine Glass</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div id="wallpaper" aria-hidden="true"></div>
    <div id="app"></div>
    <div id="cinematic-veil"></div>

    <main id="scroll-container">
      <!-- Phase 1: Logo -->
      <section id="phase-1" class="phase-section">
        <div id="logo-intro" aria-hidden="true">
          <img id="logo-intro-img" src="./icons/logo.png" alt="Logo" />
        </div>
      </section>

      <!-- Phase 2: Copy -->
      <section id="phase-2" class="phase-section">
        <div id="reveal-copy" aria-label="Wine story">
          <h2>
            <span class="line">함께하면 더 특별한 밤.</span>
          </h2>
          <p><span class="line">오늘, UTKCC와 함께 건배하세요</span></p>
        </div>
      </section>

      <!-- Phase 3: Story -->
      <section id="phase-3" class="phase-section">
        <div id="story-copy" aria-label="Story">
          <h2>
            <span class="line">대화가 쌓일수록</span>
            <span class="line">깊어진다.</span>
          </h2>
        </div>
      </section>

      <!-- Phase 4: QR -->
      <section id="phase-4" class="phase-section">
        <div id="end-assets" aria-hidden="true">
          <img id="end-text-image" src="./icons/text.png" alt="Text" />
          <img id="end-qr-image" src="./icons/qrcode.png" alt="QR code" />
        </div>
      </section>
    </main>

    <script type="module" src="./app.js"></script>
  </body>
</html>
